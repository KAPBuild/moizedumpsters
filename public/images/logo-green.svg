<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220">
  <!-- Dumpster Icon -->
  <rect x="30" y="85" width="160" height="90" rx="4" ry="4" fill="#16a34a"/>
  <rect x="30" y="75" width="160" height="18" rx="3" ry="3" fill="#15803d"/>
  <!-- Lid handles -->
  <rect x="70" y="65" width="35" height="14" rx="3" ry="3" fill="#15803d"/>
  <rect x="115" y="65" width="35" height="14" rx="3" ry="3" fill="#15803d"/>
  <!-- Dumpster stripes -->
  <rect x="30" y="115" width="160" height="4" fill="#15803d" opacity="0.5"/>
  <rect x="30" y="135" width="160" height="4" fill="#15803d" opacity="0.5"/>
  <!-- Wheels -->
  <circle cx="62" cy="178" r="10" fill="#111827"/>
  <circle cx="62" cy="178" r="5" fill="#374151"/>
  <circle cx="158" cy="178" r="10" fill="#111827"/>
  <circle cx="158" cy="178" r="5" fill="#374151"/>
  <!-- Company Name -->
  <text x="110" y="30" font-family="Arial Black, Helvetica, sans-serif" font-weight="900" font-size="22" fill="#111827" text-anchor="middle" letter-spacing="2">MOIZE</text>
  <text x="110" y="52" font-family="Arial Black, Helvetica, sans-serif" font-weight="900" font-size="14" fill="#16a34a" text-anchor="middle" letter-spacing="3">DUMPSTERS</text>
  <text x="110" y="215" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="11" fill="#6b7280" text-anchor="middle" letter-spacing="2">LLC</text>
</svg>
